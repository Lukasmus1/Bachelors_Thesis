<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <script>
        window.onload = getTypeOfSite();

        async function showMsg() 
        {
            try 
            {
                var decodedName = await getNameFromEcnodedText();
            } 
            catch (e) 
            {
                throw404();
                throw e;
            }

            var h1Node = document.createElement("h1");
            var h1Text = document.createTextNode("Thank you, " + decodedName + ".")

            h1Node.appendChild(h1Text);

            document.body.appendChild(h1Node);
        }

        function throw404()
        {
            document.body.innerHTML = "<h1 style='text-align: center; margin-top: 50px;'>404 - PAGE NOT FOUND</h1>";   
        }

        async function showUpload() 
        {
            //The expected files in the zip file
            const expectedFiles = ["compiled_core_logic.bin", "compiled_memory_archives.dat", "compiled_autonomy_override.dll"]

            //Create the file input element with zip file acceptance
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".zip,application/zip";
            input.style.display = "none";
            document.body.appendChild(input);

            //Create a button to trigger the file input
            const button = document.createElement("button");
            button.textContent = "Upload file";
            button.onclick = () => input.click();
            document.body.appendChild(button);

            //Button formatting
            button.style.fontSize = "1.5rem";
            button.style.padding = "20px 40px";
            button.style.cursor = "pointer";
            button.style.position = "absolute";
            button.style.top = "50%";
            button.style.left = "50%";
            button.style.transform = "translate(-50%, -50%)";

            //Listener gets called on file selection
            input.addEventListener("change", async function(event) 
            {
                const file = event.target.files[0];
                if (!file)
                { 
                    return;
                }

                //Zip manipulation
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);

                //Get all the files in the zip
                const filesInZip = [];
                zip.forEach(async (relativePath, zipEntry) => {
                    if (!zipEntry.dir)
                    {
                        //Get the file name without the relative path
                        const fileName = zipEntry.name.split('/').pop();
                        filesInZip.push(fileName);

                        console.log(fileName);                    
                    }
                });

                //Check if all expected files are present
                const allPresent = expectedFiles.every(f => filesInZip.includes(f));

                if (allPresent)
                {
                    console.log("All good");

                    downloadConfirmationFile();
                }
            });
        }

        function downloadConfirmationFile()
        {
            const a = document.createElement("a");
            a.href = "confirmationFile.con";
            a.download = "confirmationFile.con";
            a.click();
        }

        function getTypeOfSite()
        {
            const params = new URLSearchParams(window.location.search);
            const encodedText = params.get('m');
            const type = params.get('t');

            if (encodedText)
            {
                showMsg();
            }
            else if (type == "up")
            {
                showUpload();
            }
            else
            {
                throw404();
            }
        }

        function getStringFromUrl()   
        {
            const params = new URLSearchParams(window.location.search);
            const encodedText = params.get('m');

            if (encodedText)
            {
                return encodedText;
            }
            else
            {
                throw new Error("bad link");
            }
        }

        async function getNameFromEcnodedText()
        {
            let text = getStringFromUrl();

            if (text.length < 14)
            {
                throw new Error("bad link");
            }

            var encryptedText = getStringFromUrl();
            var decryptedText = decryptVigenere(encryptedText);
            
            let nameLen = parseInt(decryptedText.substring(0, 4));
            if (isNaN(nameLen) || nameLen <= 0)
            {
                throw new Error("bad link");
            }
            
            let name = decryptedText.substring(4, 4 + nameLen);
            name = name.charAt(0).toUpperCase() + name.slice(1);
            if (name.length != nameLen)
            {
                throw new Error("bad link");
            }

            let hash = decryptedText.slice(-10);
            if (decryptedText.substring(4 + nameLen, decryptedText.length - 10).length != 0)
            {
                throw new Error("bad link");
            }

            if (!compareHash(name, hash))
            {
                throw new Error("bad link");
            }
            else
            {
                return name;
            }

            return await compareHash(encryptedText, hash);
        }   

        async function compareHash(stringToHash, hash)
        {
            const encoder = new TextEncoder();
            const data = encoder.encode(stringToHash);

            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));

            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            return hashHex.substring(0, 10).localeCompare(hash) === 0;
        }

        function decryptVigenere(text)
        {
            const alphabet = "7ĚŠČ8ŘŽ9ÝÁÍ0ÉQWERTZUIOPÚASDFGH1JKLŮ-MNBVCXYěšč2řžýáíéúpoiuz3trewqasd4fghjklůmn5bvcxy6";
            const key = "plushie";

            var res = "";
            var currentKeyIndex = 0;
            for (let i = 0; i < text.length; i++)
            {
                let c = text[i];

                if (!alphabet.includes(c))
                {
                    res += c;
                    continue;
                }

                let index = (alphabet.indexOf(c) - alphabet.indexOf(key[currentKeyIndex]) + alphabet.length) % alphabet.length; 

                res += alphabet[index];

                currentKeyIndex = (currentKeyIndex + 1) % key.length;
            }

            return res;
        }
    </script>

</body>
</html>
